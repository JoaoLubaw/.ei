name: API · Build & Deploy

on:
    push:
        branches:
            - main
            - develop
        paths:
            - "Pontuei.Api/**"
            - "Pontuei.Shared/**"
            - "database/**"
            - "docker-compose*.yml"
            - ".github/workflows/api-deploy.yml"

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: joaolubaw/pontuei-api

jobs:
    build-and-push:
        name: Build & Push Docker Image
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        outputs:
            image_tag: ${{ steps.meta.outputs.tags }}
            short_sha: ${{ steps.vars.outputs.short_sha }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set short SHA
              id: vars
              run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix=sha-
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build & Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Pontuei.Api/Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      DOTNET_CONFIGURATION=Release
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ─────────────────────────────────────────────────
    # JOB 2 — Deploy to server via SSH
    # Only runs on 'main' (production) or 'develop'
    # ─────────────────────────────────────────────────
    deploy:
        name: Deploy to Server
        runs-on: ubuntu-latest
        needs: build-and-push
        environment:
            name: production

        steps:
            - name: Checkout (for docker-compose.yml)
              uses: actions/checkout@v4

            - name: Set environment name
              id: env_name
              run: |
                  if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
                    echo "name=production" >> $GITHUB_OUTPUT
                    echo "env_file=.env.production" >> $GITHUB_OUTPUT
                  else
                    echo "name=develop" >> $GITHUB_OUTPUT
                    echo "env_file=.env.develop" >> $GITHUB_OUTPUT
                  fi
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.SSH_PORT || 22 }}
                  script: |
                      set -e

                      DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/pontuei' }}"
                      ENV="${{ steps.env_name.outputs.name }}"
                      REGISTRY="ghcr.io"
                      IMAGE="${{ env.IMAGE_NAME }}"
                      SHA="${{ needs.build-and-push.outputs.short_sha }}"

                      echo ">>> Deploying [$ENV] — sha-$SHA"

                      # Navigate to deploy dir (must exist on server)
                      cd "$DEPLOY_DIR"

                      # Log in to GHCR on the server
                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      # Pull the new image
                      docker pull $REGISTRY/$IMAGE:sha-$SHA

                      # Point compose to the exact new image
                      export API_IMAGE="$REGISTRY/$IMAGE:sha-$SHA"

                      # Bring up (or update) services — only API is replaced here
                      # The --no-deps flag avoids restarting db/redis/minio needlessly
                      docker compose --env-file .env.$ENV up -d --no-deps --pull never pontuei-api

                      # Clean up dangling images (keep last 3)
                      docker image prune -f

                      echo ">>> Deploy [$ENV] complete — sha-$SHA"

