services:
  # ============================================================
  # MAUI APP BUILDER - Android APK Generator
  # ============================================================
  pontuei-app-builder:
    image: pontuei-app-builder:local
    build:
      context: .
      dockerfile: ./Pontuei.App/Build/Android/Dockerfile
      args:
        - MAUI_API_BASE_URL=${MAUI_API_BASE_URL}
        - MAUI_STORAGE_BASE_URL=${MAUI_STORAGE_BASE_URL}
        - MAUI_GOOGLE_WEB_CLIENT_ID=${MAUI_GOOGLE_WEB_CLIENT_ID}
        - GOOGLE_SERVICES_BASE64=${GOOGLE_SERVICES_BASE64}
    container_name: pontuei-app-builder
    command: sh -c "cp -R /artifacts/* /out/"
    volumes:
      - ./dist/app:/out

  # ============================================================
  # API - .NET Core
  # ============================================================
  pontuei-api:
    build:
      context: .
      dockerfile: ./Pontuei.Api/Dockerfile
    restart: always
    container_name: pontuei-api
    environment:
      DOTNET_CONFIGURATION: ${DOTNET_CONFIGURATION}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__PontueiDb: ${DB_CONNECTIONSTRING}
      ConnectionStrings__Redis: ${REDIS_CONNECTIONSTRING}
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
      JWT__Secret: ${JWT_SECRET}
      Storage__Endpoint: ${MINIO_ENDPOINT}
      Storage__AccessKey: ${MINIO_ACCESS_KEY}
      Storage__SecretKey: ${MINIO_SECRET_KEY}
      Storage__BucketMedia: ${MINIO_BUCKET_MEDIA}
      Storage__BucketPrograms: ${MINIO_BUCKET_PROGRAMS}
      Serilog__WriteTo__1__Args__serverUrl: ${SEQ_URL}
      EmailSettings__Host: ${EMAIL_HOST}
      EmailSettings__Port: ${EMAIL_PORT}
      EmailSettings__Username: ${EMAIL_USERNAME}
      EmailSettings__Password: ${EMAIL_PASSWORD}
      EmailSettings__From: ${EMAIL_FROM}
      FIREBASE_CREDENTIALS_BASE64: ${FIREBASE_CREDENTIALS_BASE64}
      AdminSeed__Email: ${ADMIN_EMAIL}
      AdminSeed__Password: ${ADMIN_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      pontuei-db:
        condition: service_healthy
      pontuei-redis:
        condition: service_healthy
      pontuei-minio:
        condition: service_healthy
    networks:
      - compose_net
    volumes:
      - ./assets:/App/assets

  # ============================================================
  # DATABASE - PostgreSQL 17
  # ============================================================
  pontuei-db:
    build: ./database
    restart: always
    container_name: pontuei-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PONTUEI_PASSWORD: ${PONTUEI_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - compose_net
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # CACHE & PUB/SUB - Redis 7
  # ============================================================
  pontuei-redis:
    image: redis:7-alpine
    restart: always
    container_name: pontuei-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    networks:
      - compose_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # OBJECT STORAGE - MinIO (S3-compatible)
  # ============================================================
  pontuei-minio:
    image: minio/minio:latest
    restart: always
    container_name: pontuei-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - compose_net
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # LOGGING - Seq
  # ============================================================
  pontuei-seq:
    image: datalust/seq:latest
    restart: always
    container_name: pontuei-seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_FIRSTRUN_ADMINPASSWORD}
    ports:
      - "5341:80"
    networks:
      - compose_net
    volumes:
      - seq_data:/data

volumes:
  postgres_app_data:
  redis_data:
  minio_data:
  seq_data:

networks:
  compose_net:
    driver: bridge
